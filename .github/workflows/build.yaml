name: Build Scan and Push Docker Image

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: microtodo-ui

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: microtodo-ui:latest

      - name: Scan Docker Image using Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: microtodo-ui:latest
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/microtodo-ui:latest
            ${{ secrets.DOCKER_USERNAME }}/microtodo-ui:${{ github.run_number }}
