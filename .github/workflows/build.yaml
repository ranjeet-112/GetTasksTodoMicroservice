name: Build, Scan and Push Docker Image

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: gettasktodomicroservice-v1
  REGISTRY: ghcr.io

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build image locally (don't push yet)
      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/gettasktodomicroservice-v1

      # Scan image using Trivy
      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/gettasktodomicroservice-v1
          format: table
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      # Push image to GHCR
      - name: Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/microtodo-ui:latest
            ghcr.io/${{ github.repository_owner }}/microtodo-ui:${{ github.run_number }}
